<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tu panel de aprendizaje en NihongoSpace.">
    <title>Tu Panel - NihongoSpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos especiales para la sección del Libro de Repaso */
        .seccion-repaso {
            margin-top: 40px;
            padding: 20px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }
        .btn-libro {
            background: none;
            border: none;
            font-size: 3rem;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .btn-libro:hover {
            transform: scale(1.15) rotate(-5deg);
        }
        .repaso-titulo {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3436;
            margin-top: 10px;
        }
        .repaso-subtitulo {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 15px;
        }
        .bloque-repaso-contenido {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            text-align: left;
            background: #f9f8ff;
            border-radius: 12px;
            padding: 0 15px;
        }
        .bloque-repaso-contenido.abierto {
            max-height: 650px; /* Incrementado para dar espacio suficiente a la Lección 3 */
            opacity: 1;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #e1dbff;
        }
        .tarjeta-memoria {
            margin-bottom: 15px;
            border-left: 4px solid #6c5ce7;
            padding-left: 10px;
        }
        .tarjeta-memoria:last-child {
            margin-bottom: 0;
        }
        .tarjeta-memoria h4 {
            margin: 0 0 5px 0;
            color: #6c5ce7;
            font-size: 0.95rem;
        }
        .tarjeta-memoria p {
            margin: 0;
            font-size: 0.85rem;
            color: #2d3436;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- Barra superior con ícono y datos del usuario -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">NihongoSpace 🌸</a>
            <div class="perfil-usuario">
                <div class="avatar" id="avatar-usuario">?</div>
                <div class="perfil-info">
                    <span class="perfil-nombre" id="nombre-usuario">Estudiante</span>
                    <span class="perfil-nivel" id="nivel-usuario">Sin nivel</span>
                </div>
                <div class="xp-widget">
                    <button type="button" class="perfil-xp" id="boton-xp" aria-expanded="false" aria-controls="xp-popover">
                        <span class="xp-valor" id="xp-usuario">0</span>
                        <span class="xp-etiqueta">XP</span>
                    </button>
                    <div class="xp-popover" id="xp-popover">
                        <p class="xp-popover-titulo">Progreso de nivel</p>
                        <div class="xp-barra-fondo">
                            <div class="xp-barra-relleno" id="xp-barra-relleno"></div>
                        </div>
                        <p class="xp-popover-detalle" id="xp-detalle">0 / 500 XP</p>
                    </div>
                </div>
                <button type="button" class="boton-salir" id="boton-cerrar-sesion" title="Cerrar sesión">⏻</button>
            </div>
        </div>
    </header>

    <main id="panel">
        <section class="panel-central">
            <p class="panel-eyebrow">Tu ruta de aprendizaje</p>

            <a href="leccion1.html" class="leccion-nodo" id="leccion-nodo">
                <span class="leccion-numero" id="leccion-numero">1</span>
            </a>
            <h1 class="leccion-titulo" id="leccion-titulo">Lección 1</h1>
            <p class="leccion-subtitulo" id="leccion-subtitulo">Conoce el Japonés</p>

            <!-- SECCIÓN DEL LIBRO INTELIGENTE DE REPASO -->
            <div class="seccion-repaso">
                <button type="button" class="btn-libro" id="btn-libro-repaso" aria-label="Abrir bitácora de lo aprendido">📖</button>
                <h2 class="repaso-titulo">¿Qué es lo que has aprendido?</h2>
                <p class="repaso-subtitulo">¿Se te olvidó lo que hiciste? ¡Echa un vistazo!</p>
                
                <!-- El contenedor donde se inyectarán los resúmenes -->
                <div class="bloque-repaso-contenido" id="contenedor-repaso">
                    <!-- JavaScript llenará esto según las lecciones completadas -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Creado con ❤️ por NihongoSpace</p>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ARRAY ACTUALIZADO CON LA NUEVA LECCIÓN 4
        const LECCIONES = [
            { numero: 1, titulo: 'Lección 1', subtitulo: 'Conoce el Japonés', href: 'leccion1.html' },
            { numero: 2, titulo: 'Lección 2', subtitulo: 'Aprende sobre las primeras hiraganas', href: 'leccion2.html' },
            { numero: 3, titulo: 'Lección 3', subtitulo: 'あ de araña', href: 'leccion3.html' },
            { numero: 4, titulo: 'Lección 4', subtitulo: 'Hola señora い', href: 'leccion4.html' }
        ];

        const NOMBRES_NIVEL = {
            principiante: 'Principiante',
            basico: 'Básico',
            intermedio: 'Intermedio',
            avanzado: 'Avanzado'
        };

        const elementoAvatar = document.getElementById('avatar-usuario');
        const elementoNombre = document.getElementById('nombre-usuario');
        const elementoNivel = document.getElementById('nivel-usuario');
        const elementoXP = document.getElementById('xp-usuario');

        const XP_POR_NIVEL = 500;
        const botonXP = document.getElementById('boton-xp');
        const popoverXP = document.getElementById('xp-popover');
        const barraRelleno = document.getElementById('xp-barra-relleno');
        const detalleXP = document.getElementById('xp-detalle');

        let datosPerfilActual = {};

        function aplicarPerfil(datos) {
            datosPerfilActual = datos || {};
            const nombre = (datosPerfilActual.nombre || '').trim();

            if (nombre) {
                elementoNombre.textContent = nombre;
                elementoAvatar.textContent = nombre.charAt(0).toUpperCase();
            }

            if (datosPerfilActual.nivel && NOMBRES_NIVEL[datosPerfilActual.nivel]) {
                elementoNivel.textContent = NOMBRES_NIVEL[datosPerfilActual.nivel];
            }

            elementoXP.textContent = datosPerfilActual.xp || 0;
        }

        function animarBarraXP() {
            const xpTotal = datosPerfilActual.xp || 0;
            const xpEnNivel = xpTotal % XP_POR_NIVEL;
            const porcentaje = Math.min(100, Math.round((xpEnNivel / XP_POR_NIVEL) * 100));

            detalleXP.textContent = xpEnNivel + ' / ' + XP_POR_NIVEL + ' XP';

            barraRelleno.style.width = '0%';
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    barraRelleno.style.width = porcentaje + '%';
                });
            });
        }

        function alternarPopoverXP() {
            const abierto = popoverXP.classList.toggle('visible');
            botonXP.setAttribute('aria-expanded', abierto ? 'true' : 'false');
            if (abierto) {
                animarBarraXP();
            }
        }

        botonXP.addEventListener('click', function (evento) {
            evento.stopPropagation();
            alternarPopoverXP();
        });

        document.addEventListener('click', function (evento) {
            if (!evento.target.closest('.xp-widget') && popoverXP.classList.contains('visible')) {
                popoverXP.classList.remove('visible');
                botonXP.setAttribute('aria-expanded', 'false');
            }
        });

        function mostrarLeccionActual() {
            const progreso = datosPerfilActual.progreso || 1;
            const indice = Math.min(progreso, LECCIONES.length) - 1;
            const leccion = LECCIONES[indice];

            document.getElementById('leccion-numero').textContent = leccion.numero;
            document.getElementById('leccion-titulo').textContent = leccion.titulo;
            document.getElementById('leccion-subtitulo').textContent = leccion.subtitulo;
            document.getElementById('leccion-nodo').setAttribute('href', leccion.href);

            // Generar el contenido del libro de repaso de forma dinámica
            generarContenidoRepaso(progreso);
        }

        // DIARIO DE REPASO ACTUALIZADO CON LA INFORMACIÓN DE LA LECCIÓN 3
        function generarContenidoRepaso(progreso) {
            const contenedor = document.getElementById('contenedor-repaso');
            let htmlRepaso = '';

            // Si el progreso es 1, significa que no ha completado nada aún
            if (progreso <= 1) {
                htmlRepaso = '<p style="text-align:center; color:#b2bec3; font-size:0.85rem; margin:0;">¡Aún estás comenzando tu viaje! Completa tu primera lección para desbloquear tus apuntes. 💪</p>';
            }

            // Si ya pasó la Lección 1 (Progreso >= 2), desbloquea el apunte de la L1
            if (progreso >= 2) {
                htmlRepaso += `
                    <div class="tarjeta-memoria">
                        <h4>💡 Lección 1: Conoce el Japonés</h4>
                        <p>Aprendiste las bases generales del idioma, la importancia del respeto en la cultura de Japón y cómo se estructura el mapa inicial de tu aprendizaje.</p>
                    </div>
                `;
            }

            // Si ya pasó la Lección 2 (Progreso >= 3), añade el apunte de la L2
            if (progreso >= 3) {
                htmlRepaso += `
                    <div class="tarjeta-memoria" style="margin-top: 10px;">
                        <h4>🎌 Lección 2: ¿Qué es el Hiragana?</h4>
                        <p>Descubriste que el Hiragana es el cimiento del idioma, usado para palabras nativas, partículas gramaticales y Furigana. ¡Y ya dominas la pronunciación y escritura de la vocal <strong>あ (A)</strong>!</p>
                    </div>
                `;
            }

            // NUEVA ACTUALIZACIÓN: Si el progreso es >= 4 (está en la Lección 4), añade el apunte de la L3
            if (progreso >= 4) {
                htmlRepaso += `
                    <div class="tarjeta-memoria" style="margin-top: 10px;">
                        <h4>🕷️ Lección 3: あ de araña</h4>
                        <p>Dominaste el uso de la letra <strong>あ</strong> en entornos reales. Repasaste vocabulario esencial (Ai, Abocado, Atsui, Aka, Arigatou) y consolidaste estructuras prácticas de interacción, saludos y expresiones sobre el clima.</p>
                    </div>
                `;
            }

            contenedor.innerHTML = htmlRepaso;
        }

        // LÓGICA DE CLIC EN EL LIBRO PARA DESPLEGAR CON ANIMACIÓN
        const btnLibro = document.getElementById('btn-libro-repaso');
        const contenedorRepaso = document.getElementById('contenedor-repaso');

        btnLibro.addEventListener('click', function() {
            contenedorRepaso.classList.toggle('abierto');
        });

        document.getElementById('boton-cerrar-sesion').addEventListener('click', async function () {
            await signOut(auth);
            window.location.href = 'login.html';
        });

        onAuthStateChanged(auth, async function (usuario) {
            if (!usuario) {
                window.location.href = 'login.html';
                return;
            }

            const perfilSnap = await getDoc(doc(db, 'perfiles', usuario.uid));

            if (!perfilSnap.exists() || !perfilSnap.data().nombre) {
                window.location.href = 'conoceme.html';
                return;
            }

            aplicarPerfil(perfilSnap.data());
            mostrarLeccionActual();
        });
    </script>

</body>
</html>
