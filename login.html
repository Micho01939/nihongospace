<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión o crea tu cuenta en NihongoSpace.">
    <title>Iniciar sesión - NihongoSpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">NihongoSpace 🌸</a>
        </div>
    </header>

    <main>
        <section class="hero hero-secundario">
            <h1 id="titulo-login">Inicia sesión</h1>
            <p id="subtitulo-login">Accede para continuar tu aprendizaje, o crea una cuenta nueva.</p>
        </section>

        <section class="contenido">
            <div class="login-tabs">
                <button type="button" class="login-tab activa" id="tab-login">Iniciar sesión</button>
                <button type="button" class="login-tab" id="tab-registro">Crear cuenta</button>
            </div>

            <form id="formulario-login" class="formulario" autocomplete="off">
                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="campo">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="acciones-formulario">
                    <button type="submit" class="btn-primario" id="boton-enviar">Iniciar sesión</button>
                    <span id="mensaje-login" class="estado-guardado" role="status" aria-live="polite"></span>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Creado con ❤️ por NihongoSpace</p>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import {
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const tabLogin = document.getElementById('tab-login');
        const tabRegistro = document.getElementById('tab-registro');
        const tituloLogin = document.getElementById('titulo-login');
        const subtituloLogin = document.getElementById('subtitulo-login');
        const botonEnviar = document.getElementById('boton-enviar');
        const formulario = document.getElementById('formulario-login');
        const mensaje = document.getElementById('mensaje-login');

        let modo = 'login'; // 'login' o 'registro'

        function actualizarModo() {
            const esRegistro = modo === 'registro';
            tabLogin.classList.toggle('activa', !esRegistro);
            tabRegistro.classList.toggle('activa', esRegistro);
            tituloLogin.textContent = esRegistro ? 'Crea tu cuenta' : 'Inicia sesión';
            subtituloLogin.textContent = esRegistro
                ? 'Regístrate para guardar tu progreso en la nube.'
                : 'Accede para continuar tu aprendizaje, o crea una cuenta nueva.';
            botonEnviar.textContent = esRegistro ? 'Crear cuenta' : 'Iniciar sesión';
            mensaje.textContent = '';
        }

        tabLogin.addEventListener('click', function () {
            modo = 'login';
            actualizarModo();
        });

        tabRegistro.addEventListener('click', function () {
            modo = 'registro';
            actualizarModo();
        });

        function mostrarMensaje(texto, esError) {
            mensaje.textContent = texto;
            mensaje.style.color = esError ? '#e74c3c' : '#1abc9c';
        }

        function traducirError(codigo) {
            const errores = {
                'auth/email-already-in-use': 'Ese correo ya tiene una cuenta. Intenta iniciar sesión.',
                'auth/invalid-email': 'El correo no es válido.',
                'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
                'auth/user-not-found': 'No existe una cuenta con ese correo.',
                'auth/wrong-password': 'La contraseña es incorrecta.',
                'auth/invalid-credential': 'Correo o contraseña incorrectos.'
            };
            return errores[codigo] || 'Ocurrió un error. Intenta de nuevo.';
        }

        formulario.addEventListener('submit', async function (evento) {
            evento.preventDefault();
            const correo = document.getElementById('correo').value.trim();
            const contrasena = document.getElementById('contrasena').value;

            botonEnviar.disabled = true;
            mostrarMensaje('Un momento...', false);

            try {
                let credencial;
                if (modo === 'registro') {
                    credencial = await createUserWithEmailAndPassword(auth, correo, contrasena);
                } else {
                    credencial = await signInWithEmailAndPassword(auth, correo, contrasena);
                }

                const uid = credencial.user.uid;
                const perfilRef = doc(db, 'perfiles', uid);
                const perfilSnap = await getDoc(perfilRef);

                if (perfilSnap.exists() && perfilSnap.data().nombre) {
                    window.location.href = 'panel.html';
                } else {
                    window.location.href = 'conoceme.html';
                }
            } catch (error) {
                mostrarMensaje(traducirError(error.code), true);
                botonEnviar.disabled = false;
            }
        });
    </script>

</body>
</html>
